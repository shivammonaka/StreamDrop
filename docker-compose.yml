services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: video_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/video_service
      PORT: 3000
      STORAGE_PATH: ./storage
      MAX_DB_CONNECTIONS: 5
      MAX_TRANSCODING_JOBS: 2
    volumes:
      - video_storage:/app/storage
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  video_storage: